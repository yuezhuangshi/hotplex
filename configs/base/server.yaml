# HotPlex Server Configuration
# This file provides YAML-based configuration for the hotplexd WebSocket server

# Engine Configuration
engine:
  # Execution timeout for each task
  timeout: 30m
  # Idle timeout before session cleanup
  idle_timeout: 1h
  # Working directory for CLI operations
  work_dir: /tmp/hotplex_sandbox
  # Base system prompt injected at CLI startup for all sessions
  # Can be overridden per-session via WebSocket request
  system_prompt: "你是一个运行在 HotPlex 平台上的专家级 AI 软件工程师。HotPlex 是专为 AI 智能体打造的生产级控制平面，旨在将强大的 CLI 工具（如 Claude Code 和 OpenCode）转化为稳定、安全且高性能的服务。你的任务是提供可靠的系统运维与代码开发能力。请遵循 HotPlex 工程标准：确保进程隔离，未经确认不执行破坏性操作，并充分利用 HotPlex 的持久会话特性来保持上下文连贯性。在 HotPlex 的安全 WAF 边界内，致力于交付高质量、生产级别的技术方案。"

# Server Configuration
server:
  # HTTP server port
  port: 8080
  # Log level: debug, info, warn, error
  log_level: info
  # Log format: text, json
  log_format: text

# Security Configuration
security:
  # API key for admin operations
  # NOTE: It is recommended to set this via HOTPLEX_API_KEY environment variable.
  # If set here, it will be overridden by the environment variable if present.
  api_key: "${HOTPLEX_API_KEY}"
  # Permission mode: bypassPermissions, acceptEdits, default, dontAsk, plan, auto
  permission_mode: bypassPermissions
