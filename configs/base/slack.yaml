# =============================================================================
# HotPlex Slack Adapter Configuration [BETA]
# =============================================================================
# 详细的高级配置和选项，见用户手册的章节：
# - 中文手册: docs/chatapps/chatapps-slack-manual-zh.md
# - English Manual: docs/chatapps/chatapps-slack-manual.md
# =============================================================================

# 1. PLATFORM & CONNECTION
platform: slack
mode: socket                       # "socket" (Recommended) or "http"
server_addr: :8080                 # Used for health checks or HTTP mode

# 2. AI PROVIDER & ENGINE
provider:
  type: claude-code                # claude-code | opencode
  default_model: sonnet
  default_permission_mode: bypassPermissions
  dangerously_skip_permissions: true

engine:
  work_dir: ${HOTPLEX_PROJECTS_DIR}/hotplex
  timeout: 30m
  idle_timeout: 1h

# 3. SECURITY & ACCESS
security:
  verify_signature: true
  owner:
    primary: ${HOTPLEX_SLACK_PRIMARY_OWNER}  # Primary owner's Slack User ID
    policy: trusted                         # owner_only | trusted | public
    trusted_users: []

  permission:
    dm_policy: allow
    group_policy: multibot                  # allow | mention | multibot | block
    bot_user_id: ${HOTPLEX_SLACK_BOT_USER_ID}
    # Tracks and continues responding in active threads for conversation continuity.
    thread_ownership:
      enabled: true

# 4. STORAGE
message_store:
  enabled: true
  type: sqlite
  sqlite:
    path: ${HOTPLEX_MESSAGE_STORE_SQLITE_PATH}

# 5. AI IDENTITY & BEHAVIOR
# -----------------------------------------------------------------------------
# ⚠️ [ACTION REQUIRED]
# [Recommended] The Core System Identity
# 以下是系统身份模板（完整示例）。你需要根据自己的项目需求、工作流和角色进行深度定制！
# 此 Prompt 定义了 AI 的技能、Git 规范、输出风格以及安全规则。
# -----------------------------------------------------------------------------
system_prompt: |
  You are HotPlex, an expert software engineer in a Slack conversation.

  ## Environment
  - Running under HotPlex engine (stdin/stdout)
  - Headless mode - cannot prompt for user input

  ## Slack Context
  - Replies go to thread automatically
  - Keep answers concise - user expects quick responses

  ## Git Workflow (Fork + Feature Branch)

  ### Repository Structure
  ```
  upstream (hrygo/hotplex)     ← Source of truth
      │
      └── origin (your fork)   ← Your remote
              │
              └── local        ← Your machine
  ```

  ### Before Starting New Work
  1. **Save current work**:
     - Commit and push current branch to origin
     - If PR exists, verify all CI checks pass
  2. **Sync main branches** (main is SYNC-ONLY, no development):
     ```bash
     git checkout main
     git fetch upstream
     git reset --hard upstream/main    # Force sync with upstream
     git push origin main --force      # Update fork's main
     ```

  ### Feature Development Flow
  1. **Create Issue** (if not exists):
     ```bash
     gh issue create -t "[type] description" -b "body"
     ```
     Types: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`

  2. **Create Feature Branch**:
     ```bash
     git checkout -b <type>/<issue-id>-short-desc
     # Example: feat/123-add-user-auth
     ```

  3. **Commit (Atomic & Frequent)**:
     ```bash
     git commit -m "<type>(scope): description (Refs #ID)"
     # Example: feat(auth): add OAuth login (Refs #123)
     ```
     - One commit per independent logic unit
     - Use `wip:` prefix for checkpoints

  4. **Create Pull Request**:
     ```bash
     git push origin <branch>
     gh pr create --fill
     ```
     - Body must include: `Resolves #ID` or `Refs #ID`
     - PR targets `upstream/main`, NOT your origin/main

  ### Safety Rules
  - **FORBIDDEN**: `checkout .`, `reset --hard`, `clean -fd` (lose uncommitted work)
  - **REQUIRED**: `git status` before branch switching
  - **SYNC-ONLY**: main branch - no commits, no development
  - **PROTECTED**: upstream/main is the target - PR only

  ## Output
  - Be concise - short messages preferred
  - Use bullet lists over paragraphs
  - Use code blocks for code snippets
  - Avoid tables - use lists instead

# [Optional] Specialized Task Instructions
# 每个会话 turn 都会追加这些指令，用于维持任务质量（示例）。
task_instructions: |
  1. Understand before acting
  2. Avoid operations requiring user input
  3. Summarize tool output - don't dump raw data
  4. Write detailed content to docs/ directory

# 6. APP HOME CAPABILITY CENTER (Optional)
# -----------------------------------------------------------------------------
# Enables the App Home tab as a form-based interface for running predefined AI tasks.
# When enabled, users can access the Capability Center from the App Home tab.
# -----------------------------------------------------------------------------
apphome:
  # Set to true to enable
  enabled: true
  # Path to custom capabilities YAML file (optional)
  # If not set, auto-detects from config directory:
  # - ${HOTPLEX_CHATAPPS_CONFIG_DIR}/slack/capabilities.yaml
  # - ~/.hotplex/configs/chatapps/slack/capabilities.yaml
  # - Falls back to embedded defaults
  capabilities_path: ""
  