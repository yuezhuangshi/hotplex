# ==============================================================================
# HotPlex Docker Compose Deployment
# ==============================================================================
# Quick Start:
#   make docker-up                                    # 启动所有 Bot
#   docker compose logs -f hotplex                    # 查看主 Bot 日志
#   make docker-down                                  # 停止所有 Bot
#
# ------------------------------------------------------------------------------
# Architecture Overview
# ------------------------------------------------------------------------------
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │  Bot 01 (hotplex)          │  Bot 02 (hotplex-secondary)              │
#   │  ├─ .env                   │  ├─ .env.secondary                       │
#   │  ├─ Port: 18080            │  ├─ Port: 18081                          │
#   │  ├─ projects: BOT_U0A...   │  ├─ projects: BOT_U0A...  (独立目录)     │
#   │  └─ gitconfig: -hotplex    │  └─ gitconfig: -secondary  (独立配置)    │
#   └─────────────────────────────────────────────────────────────────────────┘
#                              │
#                    ┌─────────┴─────────┐
#                    │   Shared Resources │
#                    │   • ~/.hotplex     │  ← Message DB, configs
#                    │   • ~/.claude      │  ← Session state
#                    │   • Go cache       │  ← Named volumes
#                    └───────────────────┘
#
# ------------------------------------------------------------------------------
# Key Concepts
# ------------------------------------------------------------------------------
#
# 1. YAML Anchors (&anchor / *anchor / <<: merge)
#    ─────────────────────────────────────────────
#    x-hotplex-common: &hotplex-common   # 定义 anchor（命名模板）
#      image: xxx
#      ...
#
#    hotplex:
#      <<: *hotplex-common               # 引用 anchor，合并 map 配置
#      build: ...                         # 追加/覆盖特定配置
#
#    NOTE: YAML anchors only work for maps (<<:), NOT for lists (volumes).
#          That's why volumes are duplicated per service.
#
# 2. build vs image
#    ─────────────────────────────────────────────
#    image: ghcr.io/hrygo/hotplex:latest  # 拉取远程预构建镜像
#    build: .                              # 使用本地代码构建（开发时）
#
#    When both exist, `build:` takes priority. The built image is tagged
#    with the `image:` name. This allows:
#      - Local dev: builds from your latest code
#      - CI/CD: uses pre-built image if build context missing
#
# 3. Port Binding (127.0.0.1:HOST:CONTAINER)
#    ─────────────────────────────────────────────
#    ports:
#      - "127.0.0.1:18080:8080"  # Only localhost can access (security)
#      - "18080:8080"             # ⚠️ Exposed on ALL interfaces (avoid)
#
# 4. Volume Types
#    ─────────────────────────────────────────────
#    - ${HOME}/.hotplex:/home/hotplex/.hotplex:rw    # Host path → container (rw)
#    - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw   # Named volume (persists)
#
# ------------------------------------------------------------------------------
# Multi-Bot Isolation (CRITICAL)
# ------------------------------------------------------------------------------
# Bot-specific volumes MUST be defined inline per-service, NOT via variables.
#
# WHY: Docker Compose substitutes ${VAR} at compose-time from shell/default .env,
#      NOT from each service's env_file. Using shared variables would cause all
#      bots to mount the same directory, leading to session conflicts.
#
# WRONG (will cause conflicts):
#   - ${HOTPLEX_PROJECTS_DIR}:/home/hotplex/projects   # Same for all bots!
#
# CORRECT (hardcoded per service):
#   hotplex:
#     volumes:
#       - ${HOME}/.slack/BOT_U0AHRCL1KCM:/home/hotplex/projects
#   hotplex-secondary:
#     volumes:
#       - ${HOME}/.slack/BOT_U0AJVRH4YF6:/home/hotplex/projects
#
# ------------------------------------------------------------------------------
# Adding a New Bot
# ------------------------------------------------------------------------------
# 1. Copy hotplex-secondary service block, rename to hotplex-tertiary
# 2. Create .env.tertiary with unique:
#    - HOTPLEX_SLACK_BOT_USER_ID
#    - HOTPLEX_SLACK_BOT_TOKEN
#    - HOTPLEX_SLACK_APP_TOKEN
# 3. Update volumes to use new bot's directory:
#    - ${HOME}/.slack/BOT_XXXXXXXXXX:/home/hotplex/projects
#    - ${HOME}/.gitconfig-hotplex-tertiary:/home/hotplex/.gitconfig
# 4. Add to scripts/setup_gitconfig.sh BOT_CONFIGS array
# 5. Run: ./scripts/setup_gitconfig.sh
# ==============================================================================

# ------------------------------------------------------------------------------
# YAML Anchors for DRY Configuration
# These define shared settings that services can inherit via <<: *anchor
# ------------------------------------------------------------------------------
x-hotplex-common: &hotplex-common
  image: ghcr.io/hrygo/hotplex:latest
  init: true                          # Proper PID 1 signal handling
  environment: &common-env
    HOST_UID: ${HOST_UID:-1000}
    # ─────────────────────────────────────────────────────────────────
    # Proxy Configuration (OPTIONAL)
    # ─────────────────────────────────────────────────────────────────
    # These settings are for users in China or behind a corporate proxy.
    # If you have direct internet access, comment out all 4 lines below.
    #
    # Requirements for proxy mode:
    #   1. Proxy software running on host (e.g., Clash, V2Ray)
    #   2. "Allow LAN" enabled in proxy software
    #   3. Ports match your proxy configuration (15721, 7897)
    # ─────────────────────────────────────────────────────────────────
    ANTHROPIC_BASE_URL: http://host.docker.internal:15721
    HTTP_PROXY: http://host.docker.internal:7897
    HTTPS_PROXY: http://host.docker.internal:7897
    NO_PROXY: localhost,127.0.0.1,host.docker.internal
    # ─────────────────────────────────────────────────────────────────
    # Git Identity Defaults
    # ─────────────────────────────────────────────────────────────────
    GIT_USER_NAME: ${GIT_USER_NAME:-HotPlexBot}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-noreply@hotplex.dev}
  extra_hosts:
    - "host.docker.internal:host-gateway" # Allows container to reach host
  # ─────────────────────────────────────────────────────────────────
  # Security Hardening
  # ─────────────────────────────────────────────────────────────────
  cap_drop:
    - NET_RAW
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  healthcheck: &common-healthcheck
    test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s # Grace period for slow startup
  logging: &common-logging
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy: &common-deploy
    resources:
      limits:
        memory: 2G
        cpus: '2.0'
      reservations:
        memory: 512M
        cpus: '0.25'
  restart: unless-stopped

# ------------------------------------------------------------------------------
# Named Volumes
# Persist Go build cache across container restarts (shared by all bots)
# ------------------------------------------------------------------------------
volumes:
  hotplex-go-mod:
    name: hotplex-go-mod
  hotplex-go-build:
    name: hotplex-go-build

services:
  # ============================================================================
  # Bot 01: Primary Bot
  # ============================================================================
  # Role: Production bot with Claude Opus
  # Config: .env
  # Port:  127.0.0.1:18080 → 8080 (localhost only for security)
  # Build: Defined in docker-compose.build.yml (activated via COMPOSE_FILE)
  # ============================================================================
  hotplex:
    <<: *hotplex-common
    container_name: hotplex
    ports:
      - "127.0.0.1:18080:8080"
    env_file:
      - .env
    volumes:
      - ${HOME}/.hotplex:/home/hotplex/.hotplex:rw # Message DB, configs
      - ${HOME}/.claude:/home/hotplex/.claude:rw # Session state
      - ${HOME}/.claude/settings.json:/home/hotplex/.claude/settings.json:ro
      - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw # Go module cache
      - hotplex-go-build:/home/hotplex/.cache/go-build:rw # Go build cache
      # Bot-specific volumes (MUST be unique per bot - no variables!)
      - ${HOME}/.slack/BOT_U0AHRCL1KCM:/home/hotplex/projects:rw
    labels:
      - "hotplex.bot.role=primary"
      - "hotplex.bot.config=.env"

  # ============================================================================
  # Bot 02: Secondary Bot
  # ============================================================================
  # Role: Test/Staging bot with Claude Sonnet
  # Config: .env.secondary
  # Port:  127.0.0.1:18081 → 8080 (localhost only for security)
  # Note:  Reuses image built by hotplex service (no separate build needed)
  # ============================================================================
  hotplex-secondary:
    <<: *hotplex-common
    container_name: hotplex-secondary
    ports:
      - "127.0.0.1:18081:8080"
    env_file:
      - .env.secondary
    volumes:
      # Shared volumes (common to all bots)
      - ${HOME}/.hotplex:/home/hotplex/.hotplex:rw
      - ${HOME}/.claude:/home/hotplex/.claude:rw
      - ${HOME}/.claude/settings.json:/home/hotplex/.claude/settings.json:ro
      - hotplex-go-mod:/home/hotplex/go/pkg/mod:rw
      - hotplex-go-build:/home/hotplex/.cache/go-build:rw
      # Bot-specific volumes (MUST be unique per bot - no variables!)
      - ${HOME}/.slack/BOT_U0AJVRH4YF6:/home/hotplex/projects:rw
    labels:
      - "hotplex.bot.role=secondary"
      - "hotplex.bot.config=.env.secondary"
