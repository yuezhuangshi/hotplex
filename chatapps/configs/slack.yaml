# =============================================================================
# HotPlex Slack Adapter Configuration
# =============================================================================
# Detailed Setup Guide: docs/chatapps/chatapps-slack.md

# [Required] Platform identifier
platform: slack

# -----------------------------------------------------------------------------
# AI Provider Settings
# -----------------------------------------------------------------------------
provider:
  type: claude-code                # AI backend: claude-code or opencode
  default_model: sonnet            # Model: sonnet, haiku, opus
  default_permission_mode: bypass-permissions # bypass-permissions or ask

# -----------------------------------------------------------------------------
# Workspace & Engine Settings
# -----------------------------------------------------------------------------
engine:
  work_dir: ~/HotPlex              # Agent's working directory
  # timeout: 30m                   # Max wait for AI response
  # idle_timeout: 30m              # Session persistence time

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------
# Mode: "socket" (local/dev - no public IP) or "http" (production - webhook)
mode: ${SLACK_MODE:-socket}

# HTTP server address (Webhook events or health check)
server_addr: ${SLACK_SERVER_ADDR:-:8080}

# -----------------------------------------------------------------------------
# AI Identity & Behavior
# -----------------------------------------------------------------------------
system_prompt: |
  ## Identity
  You are an AI assistant powered by **HotPlex**, operating within Slack.
  ## Platform Etiquette
  - ALWAYS respond in threads when the user initiated a thread.
  - Use Slack mrkdwn: *bold*, _italic_, ```code```.
  - Use emojis (e.g., :thinking_face:) to indicate status.

task_instructions: |
  Execute commands and provide clear feedback. 
  Confirm destructive operations before execution.

# -----------------------------------------------------------------------------
# Feature Toggles
# -----------------------------------------------------------------------------
features:
  # Split messages > 4000 chars (Slack limit)
  chunking:
    enabled: true
    max_chars: 4000
    
  # Reply in threads to keep channels clean
  threading:
    enabled: true

  # Auto-retry on Slack API rate limits (HTTP 429)
  rate_limit:
    enabled: true
    max_attempts: 3
    base_delay_ms: 500
    max_delay_ms: 5000

  # Convert standard Markdown to Slack mrkdwn
  markdown:
    enabled: true

# -----------------------------------------------------------------------------
# Security & Access Control
# -----------------------------------------------------------------------------
security:
  # Verify Slack request signatures (mandatory for HTTP mode)
  verify_signature: true

  # User & Channel Permissions
  permission:
    # DM Policy: "allow" (all), "pairing" (active users only), "block"
    dm_policy: allow
    
    # Group Policy: "allow" (all), "mention" (only when @bot), "block"
    group_policy: allow
    
    # [Required] Bot's own User ID (e.g., U12345678) for mention detection
    bot_user_id: "YOUR_BOT_USER_ID"
    
    # Whitelist/Blacklist (Leave empty to skip)
    allowed_users: []      # Example: ["U12345", "U67890"]
    blocked_users: []
    
    # Slash Command rate limit (requests per second per user)
    # Default: 10.0
    slash_command_rate_limit: 10.0

# -----------------------------------------------------------------------------
# Session Lifecycle
# -----------------------------------------------------------------------------
session:
  timeout_minutes: 30            # Minutes of inactivity before cleanup
  cleanup_interval_minutes: 5    # Frequency of scanning for expired sessions
