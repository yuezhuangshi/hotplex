<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景与全局样式 -->
  <rect width="1400" height="1000" rx="30" fill="#0D0F14"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-pro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD" />
      <stop offset="100%" stop-color="#5A189A" />
    </linearGradient>
    <linearGradient id="grad-flash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#00BBF9" />
    </linearGradient>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F77F00" />
      <stop offset="100%" stop-color="#D62828" />
    </linearGradient>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
  </defs>

  <!-- Title & Metadata -->
  <text x="700" y="60" font-family="system-ui, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">OPENCODE AGENT ECOSYSTEM V1.2</text>
  <text x="700" y="85" font-family="system-ui, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">Multi-Agent Orchestration &amp; Advanced Model Mapping Architecture</text>
  <rect x="600" y="100" width="200" height="4" fill="url(#grad-pro)" rx="2"/>

  <!-- ========================================== -->
  <!-- Header: Core Orchestration Flow            -->
  <!-- ========================================== -->
  <g transform="translate(60, 140)">
    <text y="-20" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#4B5563">PHASE A: CORE DECISION PIPELINE</text>
    
    <!-- Stage 01: Metis -->
    <rect x="0" y="0" width="280" height="180" rx="20" fill="#1A1D27" stroke="#374151" stroke-width="1.5"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#BB86FC">Metis (分析师)</text>
    <text x="20" y="65" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">任务预研 / 消除歧义 / 客观评估</text>
    <rect x="20" y="90" width="240" height="65" rx="12" fill="#242936"/>
    <text x="35" y="115" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#E5E7EB">Gemini 3.1 Pro (High)</text>
    <text x="35" y="135" font-family="system-ui, sans-serif" font-size="10" fill="#9D4EDD">Reasoning Mode • 1M Context Window</text>

    <!-- Arrow -->
    <path d="M280 90H320" stroke="#4B5563" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- Stage 02: Prometheus &amp; Momus -->
    <rect x="320" y="0" width="340" height="180" rx="20" fill="#1A1D27" stroke="#F77F00" stroke-width="1.5"/>
    <text x="340" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#F77F00">Planner (规划组)</text>
    
    <g transform="translate(340, 60)">
      <rect width="300" height="40" rx="8" fill="#2D2018"/>
      <text x="10" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#FFB74D">Prometheus: 任务原子化分解 &amp; 并行策略</text>
      <rect y="50" width="300" height="40" rx="8" fill="#2D1818"/>
      <text x="10" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#F87171">Momus: 计划严谨性审查 &amp; 鲁棒性验证</text>
    </g>
    <text x="340" y="165" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">MODEL: GLM-5 (Balanced Architecture Tuning)</text>

    <!-- Arrow -->
    <path d="M660 90H700" stroke="#4B5563" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- Stage 03: Sisyphus -->
    <rect x="700" y="0" width="280" height="180" rx="20" fill="#1A1D27" stroke="#00BBF9" stroke-width="1.5"/>
    <text x="720" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#00BBF9">Sisyphus (执行官)</text>
    <text x="720" y="65" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">主力编码 / 执行迭代 / 质量交付</text>
    <rect x="720" y="90" width="240" height="65" rx="12" fill="#242936"/>
    <text x="735" y="115" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#E5E7EB">MiniMax M2.5 HS</text>
    <text x="735" y="135" font-family="system-ui, sans-serif" font-size="10" fill="#00FA9A">Extreme Speed • Code Proficiency</text>

    <!-- Category Sidebar (Tier 3) -->
    <rect x="1020" y="-20" width="260" height="200" rx="20" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="1040" y="15" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9CA3AF">TASK CATEGORY MAPPING</text>
    <g transform="translate(1040, 40)">
      <text y="0" font-family="system-ui, sans-serif" font-size="11" fill="#BB86FC">● Ultrabrain → Gemini 3.1 Pro (High)</text>
      <text y="25" font-family="system-ui, sans-serif" font-size="11" fill="#EC4899">● Visual-Eng → Gemini 3.1 Pro (Vision)</text>
      <text y="50" font-family="system-ui, sans-serif" font-size="11" fill="#F77F00">● Unspecified-H → GLM-5</text>
      <text y="75" font-family="system-ui, sans-serif" font-size="11" fill="#00BBF9">● Artistry/Writing → MiniMax M2.5</text>
      <text y="100" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">● Quick/Low → GLM-4.5-Flash</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Middle: Specialized Knowledge &amp; Tools      -->
  <!-- ========================================== -->
  <g transform="translate(60, 380)">
    <text y="-20" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#4B5563">PHASE B: KNOWLEDGE &amp; SPECIALIZED TOOLS</text>
    
    <!-- Oracle &amp; Atlas -->
    <rect x="0" y="0" width="600" height="150" rx="24" fill="url(#grad-pro)" opacity="0.05"/>
    <rect x="0" y="0" width="600" height="150" rx="24" stroke="#9D4EDD" stroke-width="2"/>
    
    <g transform="translate(25, 30)">
      <text font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#E9D5FF">THE BRAIN TRUST</text>
      <g transform="translate(0, 30)">
        <text font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Oracle: <tspan font-weight="400" fill="#D1D5DB">架构决策、疑难杂症、安全审计 (G3.1 Pro High)</tspan></text>
        <text y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Atlas: <tspan font-weight="400" fill="#D1D5DB">全局知识图谱、RAG 向量检索、文档索引 (G3-Flash)</tspan></text>
      </g>
      <rect y="90" width="550" height="1" fill="#9D4EDD" opacity="0.3"/>
      <text y="105" font-family="system-ui, sans-serif" font-size="11" fill="#BB86FC" font-style="italic">Note: Atlas provides context to all specialized agents via project-level knowledge base.</text>
    </g>

    <!-- Toolkit Grid -->
    <g transform="translate(640, 0)">
      <rect width="640" height="150" rx="24" fill="#1A1D27" stroke="#374151" stroke-width="1"/>
      <g transform="translate(20, 25)">
        <text font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9CA3AF">SPECIALIZED UTILITY AGENTS</text>
        <g transform="translate(0, 30)">
          <!-- Librarian -->
          <rect width="180" height="70" rx="12" fill="#1F2937" stroke="#10B981" stroke-width="1"/>
          <text x="15" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#10B981">Librarian</text>
          <text x="15" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">外部文档 / API 参考</text>
          
          <!-- Explore -->
          <rect x="200" width="180" height="70" rx="12" fill="#1F2937" stroke="#3B82F6" stroke-width="1"/>
          <text x="215" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3B82F6">Explore</text>
          <text x="215" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">源码探测 / 模式识别</text>

          <!-- Multimodal -->
          <rect x="400" width="200" height="70" rx="12" fill="#1F2937" stroke="#F59E0B" stroke-width="1"/>
          <text x="415" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F59E0B">Multimodal Looker</text>
          <text x="415" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">视觉内容 / PDF / 图表</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Bottom: Model Specification Matrix         -->
  <!-- ========================================== -->
  <g transform="translate(60, 580)">
    <text y="-20" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#4B5563">PHASE C: MODEL CAPABILITY MATRIX &amp; THINKING MODES</text>
    
    <rect width="1280" height="360" rx="24" fill="#111827" stroke="#1F2937" stroke-width="1"/>
    
    <!-- Table Header -->
    <g transform="translate(40, 40)">
      <text font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#6B7280">MODEL NAME</text>
      <text x="250" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#6B7280">TIER / ROLE</text>
      <text x="500" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#6B7280">KEY SPECIFICATIONS</text>
      <text x="900" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#6B7280">AGENT MAPPING</text>
      <line y1="20" x2="1200" y2="20" stroke="#1F2937" stroke-width="1"/>
    </g>

    <!-- Row 1: Gemini 3.1 Pro -->
    <g transform="translate(40, 90)">
      <text font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Gemini 3.1 Pro (High)</text>
      <text x="250" font-family="system-ui, sans-serif" font-size="14" fill="#BB86FC">Elite Reasoning</text>
      <text x="500" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">1M context • 128k Internal CoT • Vision-Native</text>
      <text x="900" font-family="system-ui, sans-serif" font-size="12" fill="#BB86FC">Oracle, Metis, Frontend, Ultrabrain</text>
    </g>

    <!-- Row 2: GLM-5 -->
    <g transform="translate(40, 140)">
      <text font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">GLM-5 / Coding Spec</text>
      <text x="250" font-family="system-ui, sans-serif" font-size="14" fill="#F77F00">Logic Orchestration</text>
      <text x="500" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">High Structural Accuracy • Efficient Logic Flow</text>
      <text x="900" font-family="system-ui, sans-serif" font-size="12" fill="#F77F00">Prometheus, Momus, Unspecified-H</text>
    </g>

    <!-- Row 3: MiniMax M2.5 HS -->
    <g transform="translate(40, 190)">
      <text font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">MiniMax-M2.5-HS</text>
      <text x="250" font-family="system-ui, sans-serif" font-size="14" fill="#00BBF9">Speed &amp; Production</text>
      <text x="500" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Zero-Latency response • 128k Context • Low Cost</text>
      <text x="900" font-family="system-ui, sans-serif" font-size="12" fill="#00BBF9">Sisyphus, Librarian, Explore, Writing</text>
    </g>

    <!-- Row 4: Gemini 3 Flash -->
    <g transform="translate(40, 240)">
      <text font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Gemini 3-Flash</text>
      <text x="250" font-family="system-ui, sans-serif" font-size="14" fill="#48CAE4">Knowledge Engine</text>
      <text x="500" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">1M context • 4-Gear Thinking Modes • High Throughput</text>
      <text x="900" font-family="system-ui, sans-serif" font-size="12" fill="#48CAE4">Atlas (Internal Knowledge System)</text>
    </g>

    <!-- Bottom Legend -->
    <g transform="translate(40, 300)">
      <rect width="1200" height="40" rx="10" fill="#1F2937" opacity="0.5"/>
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">SYSTEM POLICY: Always consult <tspan font-weight="700" fill="#BB86FC">Oracle</tspan> for Architectural Shifts and <tspan font-weight="700" fill="#F77F00">Prometheus</tspan> for Milestone Planning. <tspan font-weight="700" fill="#00BBF9">Sisyphus</tspan> is the default driver for logic implementation.</text>
    </g>
  </g>

  <!-- Footer Footer -->
  <text x="700" y="980" font-family="system-ui, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Generated by Antigravity AI | Confidential Configuration | © 2026 OpenCode Intelligence</text>

</svg>
