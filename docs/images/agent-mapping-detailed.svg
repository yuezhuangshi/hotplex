<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景与渐变 -->
  <rect width="1200" height="900" rx="24" fill="#0A0B10"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-pro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD" />
      <stop offset="100%" stop-color="#5A189A" />
    </linearGradient>
    <linearGradient id="grad-flash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#00BBF9" />
    </linearGradient>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F77F00" />
      <stop offset="100%" stop-color="#D62828" />
    </linearGradient>
    <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4" />
      <stop offset="100%" stop-color="#023E8A" />
    </linearGradient>
  </defs>

  <!-- 装饰背景线 -->
  <g opacity="0.1">
    <path d="M0 150H1200M0 350H1200M0 600H1200" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M300 0V900M600 0V900M900 0V900" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="600" y="60" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">OPENCODE AGENT 决策流与模型全景图</text>
  <rect x="500" y="80" width="200" height="4" fill="url(#grad-pro)" rx="2"/>

  <!-- ========================================== -->
  <!-- Phase 1: Task Inlet &amp; Pre-Decision         -->
  <!-- ========================================== -->
  <text x="60" y="140" font-family="Inter" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">STAGE 01: PRE-PLANNING &amp; ANALYTICS</text>
  
  <g transform="translate(60, 160)">
    <rect width="250" height="150" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <text x="20" y="35" font-family="Inter" font-size="18" font-weight="700" fill="#BB86FC">Metis (分析师)</text>
    <text x="20" y="65" font-family="Inter" font-size="12" fill="#8B949E">识别隐蔽意图、消除歧义、可行性分析</text>
    <rect x="20" y="90" width="210" height="45" rx="8" fill="#1F2937"/>
    <text x="125" y="110" font-family="Inter" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Model: Gemini 3.1 Pro</text>
    <text x="125" y="125" font-family="Inter" font-size="10" fill="#9CA3AF" text-anchor="middle">1M Context • Logic Sensitivity</text>
  </g>

  <!-- Flow Arrow -->
  <path d="M320 235H350" stroke="#F77F00" stroke-width="2" marker-end="url(#arrow-plan)"/>

  <!-- ========================================== -->
  <!-- Phase 2: Structural Planning               -->
  <!-- ========================================== -->
  <text x="370" y="140" font-family="Inter" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">STAGE 02: ARCHITECTURAL PLANNING</text>

  <g transform="translate(370, 160)">
    <!-- Prometheus -->
    <rect width="250" height="85" rx="12" fill="#161B22" stroke="#F77F00" stroke-width="1"/>
    <text x="15" y="30" font-family="Inter" font-size="16" font-weight="700" fill="#F77F00">Prometheus (规划者)</text>
    <text x="15" y="55" font-family="Inter" font-size="11" fill="#8B949E">任务拆解、生成线性/并行执行步骤</text>
    <text x="15" y="70" font-family="Inter" font-size="10" font-weight="600" fill="#FFB74D">GLM-5: Balanced Reasoning</text>

    <!-- Momus -->
    <rect y="100" width="250" height="85" rx="12" fill="#161B22" stroke="#D62828" stroke-width="1"/>
    <text x="15" y="130" font-family="Inter" font-size="16" font-weight="700" fill="#D62828">Momus (审查员)</text>
    <text x="15" y="155" font-family="Inter" font-size="11" fill="#8B949E">评估计划清晰度、QA 验证、挑剔审查</text>
    <text x="15" y="170" font-family="Inter" font-size="10" font-weight="600" fill="#EF4444">GLM-5: Strict Logic</text>
  </g>

  <!-- Flow Arrow -->
  <path d="M630 235H660" stroke="#00F5D4" stroke-width="2" marker-end="url(#arrow-exec)"/>

  <!-- ========================================== -->
  <!-- Phase 3: High-Speed Execution             -->
  <!-- ========================================== -->
  <text x="680" y="140" font-family="Inter" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">STAGE 03: AGILE EXECUTION</text>

  <g transform="translate(680, 160)">
    <rect width="250" height="150" rx="16" fill="#161B22" stroke="#00BBF9" stroke-width="1.5"/>
    <text x="20" y="35" font-family="Inter" font-size="18" font-weight="700" fill="#00BBF9">Sisyphus (执行官)</text>
    <text x="20" y="65" font-family="Inter" font-size="12" fill="#8B949E">日常编码、代码托管、验证交付</text>
    <rect x="20" y="90" width="210" height="45" rx="8" fill="#1F2937"/>
    <text x="125" y="110" font-family="Inter" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Model: MiniMax-M2.5-HS</text>
    <text x="125" y="125" font-family="Inter" font-size="10" fill="#22D3EE" text-anchor="middle">Ultra-Low Latency • Best ROI</text>
  </g>

  <!-- ========================================== -->
  <!-- Layer 4: Intelligence &amp; Knowledge Hub      -->
  <!-- ========================================== -->
  <text x="60" y="400" font-family="Inter" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">STAGE 04: INTELLIGENCE &amp; KNOWLEDGE HUB</text>

  <g transform="translate(60, 420)">
    <!-- Oracle -->
    <rect width="430" height="120" rx="16" fill="#161B22" stroke="#9D4EDD" stroke-width="2"/>
    <text x="25" y="40" font-family="Inter" font-size="20" font-weight="800" fill="#9D4EDD">Oracle (总顾问)</text>
    <text x="25" y="70" font-family="Inter" font-size="13" fill="#E9D5FF">职责：架构决策、多系统权衡、高智商 Debug。当你“卡住”时的第一咨询对象。</text>
    <text x="25" y="100" font-family="Inter" font-size="12" font-weight="700" fill="#FFFFFF">MODEL: Gemini 3.1 Pro (High) — 128k+ Window Thinking</text>

    <!-- Atlas -->
    <rect x="460" width="430" height="120" rx="16" fill="#161B22" stroke="#48CAE4" stroke-width="2"/>
    <text x="485" y="40" font-family="Inter" font-size="20" font-weight="800" fill="#48CAE4">Atlas (知识图谱)</text>
    <text x="485" y="70" font-family="Inter" font-size="13" fill="#CAF0F8">职责：知识库维护、文档整理、RAG 分析。提供项目全局脉络与技术标准支撑。</text>
    <text x="485" y="100" font-family="Inter" font-size="12" font-weight="700" fill="#FFFFFF">MODEL: Gemini 3-Flash — 4-Level Thinking Mode</text>
  </g>

  <!-- ========================================== -->
  <!-- Layer 5: Tool Specialized Agents           -->
  <!-- ========================================== -->
  <text x="60" y="600" font-family="Inter" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">SPECIALIZED TOOLS (TIER 2)</text>

  <g transform="translate(60, 620)">
    <!-- Frontend -->
    <rect width="210" height="100" rx="12" fill="#161B22" stroke="#EC4899" stroke-width="1"/>
    <text x="15" y="30" font-family="Inter" font-size="14" font-weight="700" fill="#EC4899">Frontend-UI-UX</text>
    <text x="15" y="55" font-family="Inter" font-size="11" fill="#9CA3AF">样式、动画、多模态 UI 设计</text>
    <text x="15" y="80" font-family="Inter" font-size="10" fill="#FFFFFF" opacity="0.6">G3.1-Pro-Vision</text>

    <!-- Librarian -->
    <rect x="230" width="210" height="100" rx="12" fill="#161B22" stroke="#10B981" stroke-width="1"/>
    <text x="245" y="30" font-family="Inter" font-size="14" font-weight="700" fill="#10B981">Librarian (查档)</text>
    <text x="245" y="55" font-family="Inter" font-size="11" fill="#9CA3AF">外部 API、OSS 文档搜索</text>
    <text x="245" y="80" font-family="Inter" font-size="10" fill="#FFFFFF" opacity="0.6">MM-M2.5-Highspeed</text>

    <!-- Explore -->
    <rect x="460" width="210" height="100" rx="12" fill="#161B22" stroke="#3B82F6" stroke-width="1"/>
    <text x="475" y="30" font-family="Inter" font-size="14" font-weight="700" fill="#3B82F6">Explore (扫库)</text>
    <text x="475" y="55" font-family="Inter" font-size="11" fill="#9CA3AF">模式发现、模块依赖理解</text>
    <text x="475" y="80" font-family="Inter" font-size="10" fill="#FFFFFF" opacity="0.6">MM-M2.5-Highspeed</text>

    <!-- Multimodal -->
    <rect x="690" width="210" height="100" rx="12" fill="#161B22" stroke="#F59E0B" stroke-width="1"/>
    <text x="705" y="30" font-family="Inter" font-size="14" font-weight="700" fill="#F59E0B">Multimodal-Looker</text>
    <text x="705" y="55" font-family="Inter" font-size="11" fill="#9CA3AF">截图、图表、PDF 深度分析</text>
    <text x="705" y="80" font-family="Inter" font-size="10" fill="#FFFFFF" opacity="0.6">GLM-4.6V (Vision)</text>
  </g>

  <!-- ========================================== -->
  <!-- Bottom Mapping Table (Strategy)            -->
  <!-- ========================================== -->
  <g transform="translate(60, 750)">
    <rect width="1080" height="120" rx="16" fill="#111827" stroke="#374151" stroke-width="1"/>
    <text x="20" y="30" font-family="Inter" font-size="12" font-weight="700" fill="#9CA3AF">决策逻辑速览 (MAPPING STRATEGY)</text>
    
    <g transform="translate(20, 50)">
      <circle cx="10" cy="15" r="5" fill="#9D4EDD"/>
      <text x="25" y="20" font-family="Inter" font-size="13" fill="#FFFFFF">高推理 / 架构 / UI 创意  →  <tspan font-weight="700" fill="#9D4EDD">Gemini 3.1 Pro (The Strategist)</tspan></text>
      
      <circle cx="10" cy="45" r="5" fill="#F77F00"/>
      <text x="25" y="50" font-family="Inter" font-size="13" fill="#FFFFFF">规划 / 逻辑 / 通用高复杂  →  <tspan font-weight="700" fill="#F77F00">GLM-5 (The Planner)</tspan></text>
      
      <circle cx="10" cy="75" r="5" fill="#00BBF9"/>
      <text x="25" y="80" font-family="Inter" font-size="13" fill="#FFFFFF">编码执行 / 快速响应 / 搜索  →  <tspan font-weight="700" fill="#00BBF9">MiniMax M2.5 HS (The Executor)</tspan></text>
    </g>
    
    <g transform="translate(600, 50)">
      <rect width="450" height="50" rx="8" fill="#1F2937" stroke="#4B5563"/>
      <text x="225" y="22" font-family="Inter" font-size="12" fill="#E5E7EB" text-anchor="middle">配置路径: ~/.config/opencode/oh-my-opencode.json</text>
      <text x="225" y="40" font-family="Inter" font-size="10" fill="#9CA3AF" text-anchor="middle">Updated: 2026.02.23 | Version: 1.2.0-Alpha</text>
    </g>
  </g>

  <!-- Marker Defs -->
  <defs>
    <marker id="arrow-plan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F77F00" />
    </marker>
    <marker id="arrow-exec" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00BBF9" />
    </marker>
  </defs>
</svg>
