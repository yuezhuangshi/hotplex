<svg width="1000" height="650" viewBox="0 0 1000 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1000" height="650" rx="20" fill="#0A0B10"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-pro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#4169E1" />
    </linearGradient>
    <linearGradient id="grad-flash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FA9A" />
      <stop offset="100%" stop-color="#20B2AA" />
    </linearGradient>
    <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FF4500" />
    </linearGradient>
  </defs>

  <!-- 网格装饰线 -->
  <path d="M0 100H1000M0 250H1000M0 450H1000" stroke="#1A1C25" stroke-width="1"/>
  <path d="M200 0V650M500 0V650M800 0V650" stroke="#1A1C25" stroke-width="1"/>

  <!-- 标题 -->
  <text x="500" y="50" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">AGENT 规划与模型映射系统</text>
  <rect x="420" y="65" width="160" height="3" fill="url(#grad-pro)" rx="1.5"/>

  <!-- 第一层：逻辑触发 -->
  <text x="50" y="145" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#5D627A">TRIGGER MAPPING / 意图识别</text>

  <!-- Role A: Strategist Card -->
  <rect x="50" y="170" width="280" height="230" rx="16" fill="#14151F" stroke="#252736" stroke-width="1"/>
  <rect x="70" y="190" width="10" height="10" rx="5" fill="url(#grad-pro)"/>
  <text x="90" y="200" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Role A: Strategist</text>
  <text x="70" y="225" font-family="Inter, sans-serif" font-size="13" fill="#A0A5B8">触发：规划、设计、架构、分析、Solve</text>
  
  <g transform="translate(70, 255)">
     <rect width="80" height="24" rx="12" fill="#241B3D"/>
     <text x="40" y="16" font-family="Inter, sans-serif" font-size="11" fill="#BB86FC" text-anchor="middle">Metis 预研</text>
     <rect x="90" width="80" height="24" rx="12" fill="#241B3D"/>
     <text x="130" y="16" font-family="Inter, sans-serif" font-size="11" fill="#BB86FC" text-anchor="middle">Oracle 顾问</text>
     <rect y="35" width="100" height="24" rx="12" fill="#241B3D"/>
     <text x="50" y="51" font-family="Inter, sans-serif" font-size="11" fill="#BB86FC" text-anchor="middle">Frontend UI/UX</text>
  </g>
  <text x="70" y="340" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF">核心点：Deep Reasoning / Why &gt; How</text>
  <path d="M190 400V460" stroke="url(#grad-pro)" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-pro)"/>

  <!-- Role C: Planner Card (Transition) -->
  <rect x="360" y="170" width="280" height="230" rx="16" fill="#14151F" stroke="#252736" stroke-width="1"/>
  <rect x="380" y="190" width="10" height="10" rx="5" fill="url(#grad-plan)"/>
  <text x="400" y="200" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Role C: Planner</text>
  <text x="380" y="225" font-family="Inter, sans-serif" font-size="13" fill="#A0A5B8">触发：分解任务、生成路径、QA审查</text>
  
  <g transform="translate(380, 255)">
     <rect width="100" height="24" rx="12" fill="#3D2010"/>
     <text x="50" y="16" font-family="Inter, sans-serif" font-size="11" fill="#FFB74D" text-anchor="middle">Prometheus 规划</text>
     <rect x="110" width="90" height="24" rx="12" fill="#3D2010"/>
     <text x="155" y="16" font-family="Inter, sans-serif" font-size="11" fill="#FFB74D" text-anchor="middle">Momus 审查</text>
  </g>
  <text x="380" y="340" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF">核心点：逻辑结构化 / 粒度拆解</text>
  <path d="M500 400V460" stroke="url(#grad-plan)" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Role B: Executor Card -->
  <rect x="670" y="170" width="280" height="230" rx="16" fill="#14151F" stroke="#252736" stroke-width="1"/>
  <rect x="690" y="190" width="10" height="10" rx="5" fill="url(#grad-flash)"/>
  <text x="710" y="200" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Role B: Executor</text>
  <text x="690" y="225" font-family="Inter, sans-serif" font-size="13" fill="#A0A5B8">触发：实现、改写、格式化、Librarian</text>
  
  <g transform="translate(690, 255)">
     <rect width="100" height="24" rx="12" fill="#1B3D33"/>
     <text x="50" y="16" font-family="Inter, sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle">Sisyphus 搬砖</text>
     <rect x="110" width="90" height="24" rx="12" fill="#1B3D33"/>
     <text x="155" y="16" font-family="Inter, sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle">Explore 探索</text>
     <rect y="35" width="110" height="24" rx="12" fill="#1B3D33"/>
     <text x="55" y="51" font-family="Inter, sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle">Document Writer</text>
  </g>
  <text x="690" y="340" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF">核心点：Efficiency First / IDIOMATIC 代码</text>
  <path d="M810 400V460" stroke="url(#grad-flash)" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- 第二层：底层模型映射 -->
  <text x="50" y="495" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#5D627A">MODEL TIER / 底层基座</text>
  
  <!-- Pro Tier Model -->
  <rect x="50" y="520" width="280" height="80" rx="12" fill="url(#grad-pro)" opacity="0.15"/>
  <rect x="50" y="520" width="280" height="80" rx="12" stroke="url(#grad-pro)" stroke-width="2"/>
  <text x="190" y="555" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">Gemini 3.1 Pro (High)</text>
  <text x="190" y="580" font-family="Inter, sans-serif" font-size="11" fill="#BB86FC" text-anchor="middle">1M Context • Zero-Shot Logic • Antigravity Boost</text>

  <!-- Balanced Model -->
  <rect x="360" y="520" width="280" height="80" rx="12" fill="url(#grad-plan)" opacity="0.15"/>
  <rect x="360" y="520" width="280" height="80" rx="12" stroke="url(#grad-plan)" stroke-width="2"/>
  <text x="500" y="555" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">GLM-5 / Coding</text>
  <text x="500" y="580" font-family="Inter, sans-serif" font-size="11" fill="#FFB74D" text-anchor="middle">Structural Accuracy • Balanced Performance</text>

  <!-- Flash/Speed Model -->
  <rect x="670" y="520" width="280" height="80" rx="12" fill="url(#grad-flash)" opacity="0.15"/>
  <rect x="670" y="520" width="280" height="80" rx="12" stroke="url(#grad-flash)" stroke-width="2"/>
  <text x="810" y="555" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">MiniMax M2.5 / Flash</text>
  <text x="810" y="580" font-family="Inter, sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle">High-Speed Response • Cost Efficiency</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow-pro" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8A2BE2" />
    </marker>
  </defs>
</svg>
