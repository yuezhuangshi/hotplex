name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  test-unit:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
        run: |
          mkdir -p $HOME/.local/bin
          echo '#!/bin/bash' > $HOME/.local/bin/claude
          echo 'echo "claude version 0.0.0-mock"' >> $HOME/.local/bin/claude
          chmod +x $HOME/.local/bin/claude
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Unit Tests (CI optimized)
        run: make test-ci

      - name: Generate Coverage
        if: github.event_name == 'pull_request'
        run: go test -coverprofile=coverage.out -covermode=atomic -short ./...

      - name: Upload Coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    name: Integration Tests
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
         # Reuse same setup
        run: |
          mkdir -p $HOME/.local/bin
          echo '#!/bin/bash' > $HOME/.local/bin/claude
          echo 'echo "claude version 0.0.0-mock"' >> $HOME/.local/bin/claude
          chmod +x $HOME/.local/bin/claude
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Integration Tests
        run: make test-integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.1
          args: --timeout=10m
