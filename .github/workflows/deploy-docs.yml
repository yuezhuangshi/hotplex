name: Deploy Docs

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'docs-site/**'
      - 'docs/images/**'
      - '**/README.md'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Restore VitePress Cache
        uses: actions/cache@v4
        with:
          path: docs-site/.vitepress/cache
          key: ${{ runner.os }}-vitepress-${{ hashFiles('docs-site/package-lock.json') }}-${{ hashFiles('docs-site/.vitepress/config.mts') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin imagemagick python3-pip pkg-config libcairo2-dev libpangocairo-1.0-0
          pip3 install cairosvg --break-system-packages || pip3 install cairosvg

      - name: Generate and Sync Assets (SSOT)
        run: |
          export PATH="$PATH:$HOME/.local/bin"
          chmod +x scripts/*.sh
          ./scripts/generate_assets.sh
          ./scripts/svg2png.sh -z 4

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build with VitePress
        working-directory: docs-site
        run: npm run docs:build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist


  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    # 只在 main 分支部署（GitHub Pages 环境保护规则不允许 tag 部署）
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Site
        id: deployment
        uses: actions/deploy-pages@v4

